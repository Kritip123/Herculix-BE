# Docker Profile Configuration
spring.application.name=Herculix-BE
server.port=8080
server.servlet.context-path=/api/v1

# MongoDB Configuration (Docker)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://admin:admin123@mongodb:27017/herculix?authSource=admin}
spring.data.mongodb.database=herculix

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson Configuration
spring.jackson.time-zone=Australia/Sydney
spring.jackson.mapper.accept-case-insensitive-enums=true

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.herculix=DEBUG

# CORS Configuration
cors.allowed.origins=*
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=false

# Application Specific Configuration
app.currency=AUD
app.support-email=support@herculix.com.au
